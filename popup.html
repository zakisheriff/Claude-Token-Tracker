<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Token Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="tracker-container">
    <div class="tracker-header">
      <h1 class="tracker-title">Claude Token Tracker</h1>
      <div class="tracker-refresh" id="refreshBtn" title="Refresh">↻</div>
    </div>

    <div class="tracker-metric">
      <div class="metric-row">
        <span class="metric-label">context</span>
        <span class="metric-separator">·</span>
        <span class="metric-value" id="tokenCount">—</span>
        <span class="metric-max">/ 200k</span>
        <span class="metric-percent" id="tokenPercentage">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="tokenProgress"></div>
      </div>
    </div>

    <div class="tracker-metric">
      <div class="metric-row">
        <span class="metric-label">session</span>
        <span class="metric-separator">·</span>
        <span class="metric-value" id="sessionUsage">—</span>
        <span class="metric-unit" id="sessionReset">no data</span>
      </div>
      <div class="progress-bar session-bar">
        <div class="progress-fill session-fill" id="sessionProgress"></div>
      </div>
    </div>

    <div class="tracker-metric">
      <div class="metric-row">
        <span class="metric-label">weekly</span>
        <span class="metric-separator">·</span>
        <span class="metric-value" id="weeklyUsage">—</span>
        <span class="metric-unit" id="weeklyReset">no data</span>
      </div>
      <div class="progress-bar weekly-bar">
        <div class="progress-fill weekly-fill" id="weeklyProgress"></div>
      </div>
    </div>

    <div class="tracker-footer">
      <span class="footer-text" id="lastUpdated">no activity</span>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
